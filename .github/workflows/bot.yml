name: Forex Signal Bot

on:
  workflow_dispatch:  # Triggered by cron-job.org every 15 min at :01/:16/:31/:46 (Mon-Fri)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore signal cache
        uses: actions/cache@v4
        with:
          path: signal_cache.json
          key: signal-cache-${{ github.run_id }}
          restore-keys: signal-cache-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          MIN_CONFIDENCE: ${{ secrets.MIN_CONFIDENCE || '80' }}
        run: python run_once.py
